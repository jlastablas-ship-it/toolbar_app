<div class="fixed inset-0 bg-black/60 z-40 flex items-center justify-center p-4" (click)="close()">
  <div class="bg-base-100 rounded-lg shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col" (click)="$event.stopPropagation()">
    <!-- Header -->
    <header class="p-4 border-b border-base-300 flex justify-between items-center">
      <h3 class="text-xl font-bold">Select an Icon</h3>
      <button (click)="close()" class="p-2 rounded-full hover:bg-base-200">
        <i class="fas fa-times"></i>
      </button>
    </header>

    <!-- Tabs & Search -->
    <div class="p-4 border-b border-base-300 flex flex-col sm:flex-row gap-4">
      <div class="flex items-center gap-2" role="tablist">
        <button (click)="setTab('fa')" [class.bg-primary]="activeTab() === 'fa'" class="px-4 py-2 rounded-md text-sm transition hover:bg-base-200">
          Font Awesome
        </button>
        <button (click)="setTab('user')" [class.bg-primary]="activeTab() === 'user'" class="px-4 py-2 rounded-md text-sm transition hover:bg-base-200">
          My Images
        </button>
      </div>
      <div class="relative flex-1">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" [ngModel]="searchQuery()" (input)="onSearch($event)" placeholder="Search icons..." class="w-full bg-base-200 border border-gray-600 rounded-md pl-10 pr-4 py-2 focus:ring-primary focus:border-primary">
      </div>
    </div>
    
    <!-- Icon Grid -->
    <div class="flex-1 overflow-y-auto p-4">
      @if (isLoading()) {
        <div class="flex justify-center items-center h-full">
          <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
        </div>
      } @else {
        @if (filteredIcons().length === 0) {
            <div class="text-center py-16">
                <i class="fas fa-box-open fa-3x text-gray-500 mb-4"></i>
                <h3 class="text-xl font-semibold">No Icons Found</h3>
                <p class="text-gray-400">Try a different search term or upload images to "My Images".</p>
            </div>
        } @else {
            <div class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 lg:grid-cols-10 gap-2">
              @for (icon of filteredIcons(); track icon.code) {
                <button (click)="selectIcon(icon)" class="aspect-square bg-base-200 rounded-md flex flex-col items-center justify-center p-2 text-gray-300 hover:bg-primary hover:text-white transition group">
                  @if (icon.type === 'fa') {
                    <i [class]="icon.code" class="text-2xl"></i>
                    <span class="text-xs mt-2 text-center truncate w-full opacity-70 group-hover:opacity-100">{{ icon.code.split(' ')[1] }}</span>
                  }
                  @if (icon.type === 'user') {
                    <img [src]="getUserImage(icon.code)?.data" class="max-w-full max-h-12 object-contain" alt="User Image">
                    <span class="text-xs mt-2 text-center truncate w-full opacity-70 group-hover:opacity-100">{{ getUserImage(icon.code)?.name }}</span>
                  }
                </button>
              }
            </div>
        }
      }
    </div>
  </div>
</div>
